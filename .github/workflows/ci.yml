name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck & tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk123
          POSTGRES_DB: helpdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://helpdesk:helpdesk123@localhost:5432/helpdesk_test
      DATABASE_URL_TEST: postgresql://helpdesk:helpdesk123@localhost:5432/helpdesk_test
      JWT_SECRET: ci_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: cd backend && npm ci
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      - name: Typecheck
        run: cd backend && npm run lint
      - name: Test
        run: cd backend && npm test

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build (inclui typecheck)
        run: cd frontend && npm run build
        env:
          VITE_API_URL: http://localhost:3001
